<style>
:root {
  --ink: #0a0f14;
  --deep: #0f1923;
  --panel: #141f2b;
  --gold: #b8965a;
  --gold-light: #d4b07a;
  --gold-pale: rgba(184,150,90,0.12);
  --sage: #6b9e8c;
  --sage-pale: rgba(107,158,140,0.1);
  --smoke: #f5f3ef;
  --warm: #ede9e3;
  --text: #1a2634;
  --muted: #7a8fa3;
  --line: rgba(255,255,255,0.07);
  --line-light: #dde4ec;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--smoke); color: var(--text); overflow-x: hidden; }

/* ─── HERO ─── */
.hero {
  min-height: 100vh;
  background: var(--ink);
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: stretch;
  position: relative;
  overflow: hidden;
}

.hero-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.hero-left {
  padding: 72px 56px 80px 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  z-index: 2;
}

.hero-right {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 14px;
  padding: 80px 80px 80px 40px;
  position: relative;
  z-index: 2;
}

/* Brand */
.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 56px;
}

.brand-mark {
  width: 32px; height: 32px;
  border: 1px solid rgba(184,150,90,0.4);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.brand-mark svg { width: 16px; height: 16px; }

.brand-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 500;
  color: white;
  letter-spacing: 0.5px;
}

.brand-sep {
  width: 1px; height: 16px;
  background: rgba(255,255,255,0.15);
}

.brand-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* Hero headline */
.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(34px, 4.2vw, 58px);
  font-weight: 400;
  color: white;
  line-height: 1.15;
  margin-bottom: 28px;
  letter-spacing: -0.3px;
}

.hero h1 em {
  font-style: italic;
  color: var(--gold-light);
}

.hero-sub {
  font-size: 18px;
  color: rgba(255,255,255,0.45);
  line-height: 1.85;
  font-weight: 300;
  max-width: 440px;
  margin-bottom: 52px;
}

.hero-ctas {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 360px;
}

.btn-agente-wrap { display: flex; flex-direction: column; gap: 8px; }
.btn-agente-hint {
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  text-align: center;
  line-height: 1.5;
}

/* Buttons */
.btn-main {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: var(--gold);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  padding: 15px 28px;
  border-radius: 100px;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 0.2px;
}

.btn-main:hover {
  background: var(--gold-light);
  transform: translateY(-2px);
  box-shadow: 0 14px 36px rgba(184,150,90,0.28);
}

.btn-outline {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  padding: 14px 28px;
  border-radius: 100px;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.12);
  cursor: pointer;
  transition: all 0.25s;
}

.btn-outline:hover {
  border-color: rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.8);
}

/* Stat cards */
.stat-card {
  background: rgba(255,255,255,0.035);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 28px 30px;
  position: relative;
  overflow: hidden;
  transition: background 0.25s, border-color 0.25s;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,150,90,0.3), transparent);
  opacity: 0;
  transition: opacity 0.25s;
}

.stat-card:hover { 
  background: rgba(255,255,255,0.06); 
  border-color: rgba(255,255,255,0.12);
}

.stat-card:hover::before { opacity: 1; }

.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  font-weight: 500;
  color: var(--gold-light);
  line-height: 1;
  margin-bottom: 10px;
}

.stat-txt {
  font-size: 15px;
  color: rgba(255,255,255,0.4);
  line-height: 1.65;
}

.stat-src {
  font-size: 10px;
  color: rgba(255,255,255,0.18);
  margin-top: 8px;
  font-style: italic;
}

/* ─── LAYOUT ─── */
.wrap { max-width: 1060px; margin: 0 auto; padding: 0 36px; }
.section { padding: 104px 0; }

.section-label {
  font-size: 10px;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: var(--sage);
  font-weight: 500;
  margin-bottom: 16px;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(30px, 3.8vw, 48px);
  font-weight: 400;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 22px;
  letter-spacing: -0.2px;
}

.section-title em { font-style: italic; color: var(--sage); }
.section-body {
  font-size: 18px;
  color: var(--muted);
  line-height: 1.85;
  max-width: 100%;
  font-weight: 300;
  margin-bottom: 60px;
}

/* ─── PROBLEMA ─── */
.problema-bg { background: var(--smoke); }

.problema-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.prob-card {
  background: white;
  border: 1px solid var(--line-light);
  border-radius: 20px;
  padding: 38px 34px;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.prob-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--sage), var(--gold));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.35s ease;
}

.prob-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 48px rgba(26,38,52,0.09);
}
